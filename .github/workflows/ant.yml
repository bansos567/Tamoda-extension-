name: Build Extension

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        ant
        ant extensions

    - name: Upload AIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TamodaGuard-Extension
        path: out/*.aix
